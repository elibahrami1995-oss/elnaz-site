<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>چت با دستیار الناز بهرامی</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAF6EF;
    --surface:#FFFFFF;
    --text:#26211C;
    --text-muted:#847A6C;
    --accent:#5C0F1C;
    --accent-dark:#400A14;
    --border:#E3D9CA;
    --font:'Vazirmatn',sans-serif;
    --radius:18px;
    --shadow:0 10px 30px rgba(38,33,28,.08);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;}
  body{
    font-family:var(--font);
    background:var(--bg);
    color:var(--text);
    display:flex;
    flex-direction:column;
  }

  /* ── Header ── */
  .chat-header{
    display:flex;
    align-items:center;
    gap:14px;
    padding:16px 24px;
    background:var(--surface);
    border-bottom:1px solid var(--border);
    box-shadow:var(--shadow);
    flex-shrink:0;
  }
  .chat-header a{
    font-size:.85rem;
    color:var(--text-muted);
    text-decoration:none;
  }
  .chat-header a:hover{color:var(--accent);}
  .avatar{
    width:44px;height:44px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent-dark));
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:1.3rem;flex-shrink:0;
  }
  .header-info h1{font-size:1.05rem;font-weight:700;}
  .status{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--text-muted);}
  .status-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;}

  /* ── Messages ── */
  .messages{
    flex:1;
    overflow-y:auto;
    padding:24px 16px;
    display:flex;
    flex-direction:column;
    gap:16px;
    max-width:760px;
    width:100%;
    margin:0 auto;
  }
  .messages::-webkit-scrollbar{width:4px;}
  .messages::-webkit-scrollbar-track{background:transparent;}
  .messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

  .msg{
    display:flex;
    flex-direction:column;
    max-width:75%;
  }
  .msg.bot{align-self:flex-start;align-items:flex-start;}
  .msg.user{align-self:flex-end;align-items:flex-end;}

  .bubble{
    padding:12px 18px;
    border-radius:var(--radius);
    font-size:.95rem;
    line-height:1.8;
    white-space:pre-wrap;
    word-break:break-word;
  }
  .msg.bot  .bubble{
    background:var(--surface);
    border:1px solid var(--border);
    border-top-right-radius:4px;
    box-shadow:var(--shadow);
  }
  .msg.user .bubble{
    background:var(--accent);
    color:#fff;
    border-bottom-left-radius:4px;
  }
  .msg-time{
    font-size:.7rem;
    color:var(--text-muted);
    margin-top:4px;
    padding:0 6px;
  }

  /* Typing indicator */
  .typing .bubble{
    padding:16px 20px;
    display:flex;gap:5px;align-items:center;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--text-muted);
    animation:bounce .9s infinite;
  }
  .dot:nth-child(2){animation-delay:.2s;}
  .dot:nth-child(3){animation-delay:.4s;}
  @keyframes bounce{
    0%,60%,100%{transform:translateY(0);}
    30%{transform:translateY(-6px);}
  }

  /* ── Input bar ── */
  .input-bar{
    padding:16px 24px;
    background:var(--surface);
    border-top:1px solid var(--border);
    display:flex;
    gap:10px;
    align-items:flex-end;
    max-width:760px;
    width:100%;
    margin:0 auto;
    /* stretch across full width on small screens */
    align-self:stretch;
  }
  .input-wrap{flex:1;position:relative;}
  textarea{
    width:100%;
    min-height:44px;
    max-height:160px;
    resize:none;
    border:1.5px solid var(--border);
    border-radius:14px;
    padding:11px 16px;
    font-family:var(--font);
    font-size:.95rem;
    color:var(--text);
    background:var(--bg);
    outline:none;
    transition:border-color .2s;
    line-height:1.6;
  }
  textarea:focus{border-color:var(--accent);}
  textarea::placeholder{color:var(--text-muted);}

  button.send{
    width:44px;height:44px;
    border-radius:12px;
    border:none;
    background:var(--accent);
    color:#fff;
    font-size:1.2rem;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .2s,transform .1s;
    flex-shrink:0;
  }
  button.send:hover{background:var(--accent-dark);}
  button.send:active{transform:scale(.93);}
  button.send:disabled{background:var(--border);cursor:not-allowed;}

  /* Suggested questions (shown before first message) */
  .suggestions{
    display:flex;flex-wrap:wrap;gap:8px;
    margin-top:auto;
    padding:0 0 8px;
  }
  .sugg{
    padding:8px 16px;
    border:1.5px solid var(--border);
    border-radius:50px;
    font-size:.82rem;
    cursor:pointer;
    background:var(--surface);
    color:var(--text);
    transition:border-color .2s,background .2s;
    font-family:var(--font);
  }
  .sugg:hover{border-color:var(--accent);background:rgba(92,15,28,.05);}

  /* Responsive */
  @media(max-width:600px){
    .messages{padding:16px 10px;}
    .msg{max-width:90%;}
    .input-bar{padding:12px;}
  }
</style>
</head>
<body>

<header class="chat-header">
  <a href="/">← بازگشت</a>
  <div class="avatar">🤖</div>
  <div class="header-info">
    <h1>دستیار الناز بهرامی</h1>
    <div class="status">
      <span class="status-dot"></span>
      <span>آنلاین</span>
    </div>
  </div>
</header>

<div class="messages" id="messages">
  <!-- Welcome message -->
  <div class="msg bot" id="welcome-msg">
    <div class="bubble">سلام! 👋 من دستیار هوشمند <strong>الناز بهرامی</strong> هستم.

می‌تونم درباره خدمات، دوره‌های آموزشی هوش مصنوعی، و تولید محتوا کمکت کنم. از چی می‌خوای شروع کنیم؟</div>
    <span class="msg-time" id="welcome-time"></span>
  </div>

  <div class="suggestions" id="suggestions">
    <button class="sugg" onclick="askSugg(this)">خدمات الناز چیه؟</button>
    <button class="sugg" onclick="askSugg(this)">دوره‌های آموزشی چی دارید؟</button>
    <button class="sugg" onclick="askSugg(this)">چطور می‌تونم ثبت‌نام کنم؟</button>
    <button class="sugg" onclick="askSugg(this)">وضعیت ثبت‌نامم رو بررسی کن</button>
  </div>
</div>

<div style="display:flex;justify-content:center;background:var(--surface);border-top:1px solid var(--border);">
  <div class="input-bar">
    <div class="input-wrap">
      <textarea
        id="input"
        placeholder="پیامت رو اینجا بنویس…"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
    </div>
    <button class="send" id="send-btn" onclick="sendMessage()" title="ارسال">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
  // Unique session for this browser tab
  const SESSION_ID = 'web_' + Math.random().toString(36).slice(2);
  let isWaiting = false;

  // Set welcome time
  document.getElementById('welcome-time').textContent = nowTime();

  function nowTime() {
    return new Date().toLocaleTimeString('fa-IR', { hour:'2-digit', minute:'2-digit' });
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function askSugg(btn) {
    document.getElementById('input').value = btn.textContent;
    document.getElementById('suggestions')?.remove();
    sendMessage();
  }

  function appendMessage(role, text) {
    const msgs = document.getElementById('messages');
    const div  = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div><span class="msg-time">${nowTime()}</span>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const div  = document.createElement('div');
    div.className = 'msg bot typing';
    div.id = 'typing';
    div.innerHTML = `<div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    document.getElementById('typing')?.remove();
  }

  function escapeHtml(t) {
    return t
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/\n/g,'<br>');
  }

  async function sendMessage() {
    if (isWaiting) return;
    const input = document.getElementById('input');
    const text  = input.value.trim();
    if (!text) return;

    // Hide suggestions if still showing
    document.getElementById('suggestions')?.remove();

    input.value = '';
    input.style.height = 'auto';
    appendMessage('user', text);

    isWaiting = true;
    document.getElementById('send-btn').disabled = true;
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method:  'POST',
        headers: {
          'Content-Type':   'application/json',
          'x-chat-source':  'website',
        },
        body: JSON.stringify({ message: text, sessionId: SESSION_ID }),
      });
      const data = await res.json();
      removeTyping();
      appendMessage('bot', data.reply || data.error || 'خطای ناشناخته');
    } catch {
      removeTyping();
      appendMessage('bot', 'متأسفم، ارتباط با سرور قطع شد. دوباره امتحان کن 🙏');
    } finally {
      isWaiting = false;
      document.getElementById('send-btn').disabled = false;
      input.focus();
    }
  }
</script>
</body>
</html>
